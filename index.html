<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Orlando — Ride Heatmap Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a12;
    --surface: #0d1022;
    --surface2: #111428;
    --border: #1c2040;
    --text: #eaecf8;
    --muted: #8f96c0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 36px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-mark { width: 26px; height: 26px; flex-shrink: 0; }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    background: linear-gradient(100deg, #c4b5fd 0%, #818cf8 45%, #93c5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    letter-spacing: 0.04em;
  }

  /* ── CONTENT ── */
  .content { max-width: 860px; margin: 0 auto; padding: 40px 24px 0; }

  /* ── PARK SECTION ── */
  .park-section { margin-bottom: 52px; }

  .park-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .park-dot {
    width: 10px; height: 10px;
    border-radius: 50%; flex-shrink: 0;
  }

  .park-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .park-count {
    font-size: 11px;
    color: var(--muted);
  }

  .open-all-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .open-all-btn:hover { opacity: 0.88; transform: scale(1.02); }
  .open-all-btn:active { transform: scale(0.98); }

  /* ── RIDE GRID ── */
  .ride-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }

  .ride-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    cursor: pointer;
  }
  .ride-card:hover {
    background: var(--surface2);
    border-color: #2a3060;
    transform: translateY(-1px);
  }
  .ride-card:active { transform: translateY(0); }

  .rank-badge {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .r1  { background: linear-gradient(135deg,#f59e0b,#fde68a); color:#1a0a00; }
  .r2  { background: linear-gradient(135deg,#9ca3af,#f3f4f6); color:#111; }
  .r3  { background: linear-gradient(135deg,#b45309,#fcd34d); color:#1a0500; }
  .r45 { background: rgba(109,74,255,0.25); color:#c4b5fd; }
  .r67 { background: rgba(59,130,246,0.25); color:#93c5fd; }
  .rlo { background: var(--border); color: var(--muted); }

  .ride-card-info { flex: 1; min-width: 0; }
  .ride-card-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.3;
  }
  .ride-card-sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; }

  .ride-arrow {
    font-size: 13px; color: var(--muted);
    flex-shrink: 0; opacity: 0.5;
    transition: opacity 0.15s, transform 0.15s;
  }
  .ride-card:hover .ride-arrow { opacity: 1; transform: translateX(2px); }

  /* ── LAND LABEL inside grid ── */
  .land-divider {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }
  .land-divider-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .land-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Popup blocked notice */
  .popup-notice {
    display: none;
    margin-top: 10px;
    font-size: 11.5px;
    color: #fbbf24;
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 8px;
    padding: 8px 14px;
  }
  .popup-notice.visible { display: block; }

  /* ── LIVE INDICATORS ── */
  .live-status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 5px;
    min-height: 14px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%; flex-shrink: 0;
  }
  .status-dot.open   { background: #4ade80; box-shadow: 0 0 5px #4ade8099; }
  .status-dot.closed { background: #f87171; box-shadow: 0 0 5px #f8717199; }
  .status-dot.loading { background: var(--border); animation: pulse-skel 1.2s infinite; }
  @keyframes pulse-skel { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .wait-pill {
    font-size: 10.5px; font-weight: 600;
    padding: 1px 7px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .wait-pill.closed-label {
    color: var(--muted);
    background: rgba(255,255,255,0.05);
  }

  .live-refresh-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 11px;
    color: var(--muted);
  }
  .refresh-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 11px; padding: 3px 10px; cursor: pointer;
    font-family: 'Outfit', sans-serif; transition: color 0.15s, border-color 0.15s;
  }
  .refresh-btn:hover { color: var(--text); border-color: #4ade8088; }
</style>
</head>
<body>

<header>
  <svg class="logo-mark" viewBox="0 0 26 26" fill="none">
    <circle cx="13" cy="13" r="12" stroke="#818cf8" stroke-width="1.4"/>
    <circle cx="13" cy="13" r="7" stroke="#c4b5fd" stroke-width="0.9" stroke-dasharray="2.2 1.8"/>
    <path d="M13 5L14 10.8L20 13L14 15.2L13 21L12 15.2L6 13L12 10.8Z" fill="#fcd34d"/>
  </svg>
  <span class="header-title">UNIVERSAL ORLANDO · THRILL DATA LAUNCHER</span>
  <span class="header-sub">Opens 30-day heatmaps on Thrill Data</span>
</header>

<div class="content" id="content"></div>
<div class="live-refresh-row" style="max-width:860px;margin:10px auto 0;padding:0 24px">
  <span id="live-timestamp" style="color:var(--muted)">Loading live data…</span>
  <button class="refresh-btn" onclick="fetchAllLive()">↻ Refresh</button>
</div>

<script>
const PARKS = [
  {
    key: 'epic',

    lands: {
      "Super Nintendo World": "#e8380d",
      "Ministry of Magic":    "#8b5cf6",
      "Dark Universe":        "#6b7280",

      "Celestial Park":       "#6d4aff",
    },
    rides: [
      { rank:1,  name:"Mine-Cart Madness",                     land:"Super Nintendo World", type:"Family Coaster",        slug:"minecartmadness" },
      { rank:2,  name:"Mario Kart: Bowser's Challenge",        land:"Super Nintendo World", type:"Interactive Dark Ride", slug:"mariokartbowserschallenge" },
      { rank:3,  name:"Harry Potter & Battle at the Ministry", land:"Ministry of Magic",    type:"Motion Simulation",     slug:"harrypotterandthebattleattheministry" },
      { rank:4,  name:"Monsters Unchained",                    land:"Dark Universe",        type:"KUKA Arm Dark Ride",    slug:"monstersunchainedthefrankensteinexperiment" },
      { rank:5,  name:"Stardust Racers",                       land:"Celestial Park",       type:"Dueling Coaster",       slug:"stardustracers" },
      { rank:6,  name:"Hiccup's Wing Gliders",                 land:"Isle of Berk",         type:"Multi-Launch Coaster",  slug:"hiccupswinggliders" },
      { rank:7,  name:"Curse of the Werewolf",                 land:"Dark Universe",        type:"Spinning Coaster",      slug:"curseofthewerewolf" },
      { rank:8,  name:"Dragon Racer's Rally",                  land:"Isle of Berk",         type:"Sky Fly",               slug:"dragonracersrally" },
      { rank:9,  name:"Fyre Drill",                            land:"Isle of Berk",         type:"Splash Battle",         slug:"fyredrill" },
      { rank:10, name:"Yoshi's Adventure",                     land:"Super Nintendo World", type:"Omnimover Dark Ride",   slug:"yoshisadventure" },
      { rank:11, name:"Constellation Carousel",                land:"Celestial Park",       type:"Family Carousel",       slug:"constellationcarousel" },
    ]
  },
  {
    key: 'ioa',
    name: 'Islands of Adventure',
    dot: '#38bdf8',
    btnBg: 'linear-gradient(135deg,#0369a1,#0ea5e9)',
    slug: 'islands-of-adventure',
    lands: {
      "The Wizarding World":       "#8b5cf6",
      "Jurassic World":            "#16a34a",
      "Marvel Super Hero Island":  "#dc2626",
      "Skull Island":              "#78350f",
      "Toon Lagoon":               "#0ea5e9",
    },
    rides: [
      { rank:1,  name:"Hagrid's Magical Creatures Motorbike Adventure", land:"The Wizarding World",      type:"Story Coaster",      slug:"hagridsmagicalcreaturesmotorbikeadventure" },
      { rank:2,  name:"Jurassic World VelociCoaster",                   land:"Jurassic World",           type:"Launch Coaster",     slug:"jurassicworldvelocicoaster" },
      { rank:3,  name:"Harry Potter and the Forbidden Journey",         land:"The Wizarding World",      type:"KUKA Arm Dark Ride", slug:"harrypotterandtheforbiddenjourney" },
      { rank:4,  name:"The Incredible Hulk Coaster",                   land:"Marvel Super Hero Island", type:"Launch Coaster",     slug:"theincrediblehulkcoaster" },
      { rank:5,  name:"Flight of the Hippogriff",                      land:"The Wizarding World",      type:"Family Coaster",     slug:"flightofthehippogriff" },
      { rank:6,  name:"The Amazing Adventures of Spider-Man",          land:"Marvel Super Hero Island", type:"3D Dark Ride",       slug:"theamazingadventuresofspiderman" },
      { rank:7,  name:"Skull Island: Reign of Kong",                   land:"Skull Island",             type:"Dark Ride",          slug:"skullislandreignofkong" },
      { rank:8,  name:"Doctor Doom's Fearfall",                        land:"Marvel Super Hero Island", type:"Drop Tower",         slug:"doctordoomsfearfall" },
      { rank:9,  name:"Popeye & Bluto's Bilge-Rat Barges",            land:"Toon Lagoon",              type:"River Raft Ride",    slug:"popeyeandblutosbilgeratbarges" },
      { rank:10, name:"Pteranodon Flyers",                             land:"Jurassic World",           type:"Suspended Ride",     slug:"pteranodonflyers" },
    ]
  },
  {
    key: 'usf',
    name: 'Universal Studios Florida',
    dot: '#f87171',
    btnBg: 'linear-gradient(135deg,#b91c1c,#ef4444)',
    slug: 'universal-studios',
    lands: {
      "The Wizarding World": "#8b5cf6",
      "New York":            "#64748b",
      "Minion Land":         "#f59e0b",
      "World Expo":          "#0ea5e9",
      "Springfield":         "#e8380d",
      "San Francisco":       "#dc2626",
      "Hollywood":           "#db2777",
    },
    rides: [
      { rank:1, name:"Harry Potter and the Escape from Gringotts",  land:"The Wizarding World", type:"Multi-Dimension Ride",  slug:"harrypotterandtheescapefromgringotts" },
      { rank:2, name:"Revenge of the Mummy",                        land:"New York",            type:"Indoor Coaster",        slug:"revengeofthemummy" },
      { rank:3, name:"Transformers: The Ride-3D",                   land:"New York",            type:"3D Dark Ride",          slug:"transformerstherided" },
      { rank:4, name:"Despicable Me Minion Mayhem",                 land:"Minion Land",         type:"Motion Simulator",      slug:"despicablememinionmayhem" },
      { rank:5, name:"Men in Black: Alien Attack",                  land:"World Expo",          type:"Interactive Dark Ride", slug:"meninblackalienattack" },
      { rank:6, name:"The Simpsons Ride",                           land:"Springfield",         type:"Motion Simulator",      slug:"thesimpsonsride" },
      { rank:7, name:"Fast & Furious: Supercharged",               land:"San Francisco",       type:"Motion Simulator",      slug:"fastfurioussupercharged" },
      { rank:8, name:"Race Through New York Starring Jimmy Fallon", land:"New York",            type:"Flying Theater",        slug:"racethroughnewyorkstarringjimmyfallon" },
      { rank:9, name:"E.T. Adventure",                              land:"Hollywood",           type:"Dark Ride",             slug:"etadventure" },
    ]
  }
];

// ── HELPERS ──────────────────────────────────────────────────
function rideUrl(parkSlug, rideSlug) {
  return `https://www.thrill-data.com/waits/attraction/${parkSlug}/${rideSlug}/#heatmapwait`;
}

function rankCls(r) {
  return r===1?'r1':r===2?'r2':r===3?'r3':r<=5?'r45':r<=7?'r67':'rlo';
}

function norm(s) {
  return s.toLowerCase().replace(/[^a-z0-9]/g, '');
}

// ── LIVE DATA ─────────────────────────────────────────────────
const QT_IDS = { epic: 100, ioa: 64, usf: 65 };
const liveMap = {};
let refreshTimer = null;

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

async function tryFetch(url) {
  const res = await withTimeout(fetch(url), 7000);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res;
}

async function fetchJson(qtUrl) {
  const enc = encodeURIComponent(qtUrl);
  const proxies = [
    // Direct — works if queue-times sends CORS *
    async () => { const r = await tryFetch(qtUrl); return r.json(); },
    // allorigins — wraps in { contents: "..." }
    async () => {
      const r = await tryFetch(`https://api.allorigins.win/get?url=${enc}`);
      const j = await r.json();
      return JSON.parse(j.contents);
    },
    // corsproxy.io — returns raw JSON
    async () => { const r = await tryFetch(`https://corsproxy.io/?${enc}`); return r.json(); },
    // codetabs
    async () => { const r = await tryFetch(`https://api.codetabs.com/v1/proxy?quest=${enc}`); return r.json(); },
  ];
  for (const attempt of proxies) {
    try { return await attempt(); } catch(e) { /* try next */ }
  }
  throw new Error('All proxies failed for ' + qtUrl);
}

async function fetchPark(parkKey) {
  const id   = QT_IDS[parkKey];
  const data = await fetchJson(`https://queue-times.com/parks/${id}/queue_times.json`);
  data.lands.forEach(land => {
    land.rides.forEach(ride => {
      const n = ride.name;
      // Detect single-rider entries by common suffixes
      const srMatch = n.match(/^(.+?)\s*[-–—]\s*(single\s*rider|sr)\s*$/i);
      if (srMatch) {
        const baseKey = norm(srMatch[1]);
        if (!liveMap[baseKey]) liveMap[baseKey] = {};
        liveMap[baseKey].sr_open = ride.is_open;
        liveMap[baseKey].sr_wait = ride.wait_time;
      } else {
        const key = norm(n);
        if (!liveMap[key]) liveMap[key] = {};
        liveMap[key].is_open = ride.is_open;
        liveMap[key].wait    = ride.wait_time;
      }
    });
  });
}

async function fetchAllLive() {
  // Reset to loading state
  document.querySelectorAll('.status-dot').forEach(d => d.className = 'status-dot loading');
  document.querySelectorAll('.wait-pill').forEach(p => {
    p.textContent = '…';
    p.style.color = 'var(--muted)';
    p.style.background = '';
    p.style.border = '';
  });
  const tsEl = document.getElementById('live-timestamp');
  if (tsEl) tsEl.textContent = 'Fetching…';

  try {
    await Promise.all(Object.keys(QT_IDS).map(fetchPark));
    applyLiveData();
    if (tsEl) tsEl.textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.querySelectorAll('.status-dot').forEach(d => d.className = 'status-dot closed');
    document.querySelectorAll('.wait-pill').forEach(p => {
      p.textContent = 'err';
      p.style.color = '#f87171';
    });
    if (tsEl) tsEl.textContent = 'Failed — check console';
    console.error('Queue-Times fetch error:', e);
  }

  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchAllLive, 5 * 60 * 1000);
}

function applyLiveData() {
  document.querySelectorAll('[data-ride-norm]').forEach(card => {
    const live   = liveMap[card.dataset.rideNorm];
    const dot    = card.querySelector('.status-dot');
    const pill   = card.querySelector('.wait-pill');
    const srPill = card.querySelector('.sr-pill');

    if (!live) {
      if (dot)    dot.className = 'status-dot closed';
      if (pill) { pill.textContent = '—'; pill.style.color = 'var(--muted)'; }
      if (srPill) srPill.style.display = 'none';
      return;
    }

    if (dot) dot.className = 'status-dot ' + (live.is_open ? 'open' : 'closed');

    if (pill) {
      if (!live.is_open) {
        pill.textContent = 'Closed';
        pill.style.color = 'var(--muted)';
        pill.style.background = 'rgba(255,255,255,0.05)';
        pill.style.border = '1px solid rgba(255,255,255,0.08)';
      } else {
        const w   = live.wait;
        const clr = w < 20 ? '#4ade80' : w < 40 ? '#a3e635' : w < 60 ? '#fbbf24' : w < 80 ? '#f97316' : '#f87171';
        pill.textContent = w + ' min';
        pill.style.color = clr;
        pill.style.background = clr + '18';
        pill.style.border = '1px solid ' + clr + '44';
      }
    }

    if (srPill) {
      if (live.is_open && live.sr_open && live.sr_wait != null) {
        const w   = live.sr_wait;
        const clr = w < 20 ? '#4ade80' : w < 40 ? '#a3e635' : w < 60 ? '#fbbf24' : w < 80 ? '#f97316' : '#f87171';
        srPill.style.display = '';
        srPill.textContent = 'SR ' + w + 'm';
        srPill.style.color = clr;
        srPill.style.background = clr + '18';
        srPill.style.border = '1px solid ' + clr + '44';
      } else {
        srPill.style.display = 'none';
      }
    }
  });
}

// ── BUILD UI ──────────────────────────────────────────────────
function openAll(park, noticeId) {
  let blocked = false;
  park.rides.forEach(ride => {
    const w = window.open(rideUrl(park.slug, ride.slug), '_blank');
    if (!w) blocked = true;
  });
  if (blocked) document.getElementById(noticeId).classList.add('visible');
}

function build() {
  const content = document.getElementById('content');

  PARKS.forEach(park => {
    const noticeId = 'notice-' + park.key;
    const section  = document.createElement('div');
    section.className = 'park-section';

    // Park header
    const header = document.createElement('div');
    header.className = 'park-header';
    header.innerHTML = `
      <div class="park-dot" style="background:${park.dot};box-shadow:0 0 8px ${park.dot}66"></div>
      <span class="park-name" style="color:${park.dot}">${park.name}</span>
      <span class="park-count">${park.rides.length} rides</span>`;
    const btn = document.createElement('button');
    btn.className = 'open-all-btn';
    btn.style.background = park.btnBg;
    btn.style.color = '#fff';
    btn.innerHTML = `<span>⚡</span> Open All ${park.rides.length} Tabs`;
    btn.addEventListener('click', () => openAll(park, noticeId));
    header.appendChild(btn);
    section.appendChild(header);

    // Popup notice
    const notice = document.createElement('div');
    notice.className = 'popup-notice';
    notice.id = noticeId;
    notice.textContent = '⚠ Pop-ups blocked — allow pop-ups for this page in Chrome, then try again.';
    section.appendChild(notice);

    // Ride grid
    const grid = document.createElement('div');
    grid.className = 'ride-grid';

    const landOrder = [...new Set(park.rides.map(r => r.land))];
    const byLand = {};
    park.rides.forEach(r => (byLand[r.land] = byLand[r.land] || []).push(r));

    landOrder.forEach(land => {
      const divider = document.createElement('div');
      divider.className = 'land-divider';
      divider.innerHTML = `
        <span class="land-divider-label" style="color:${park.lands[land]}">${land}</span>
        <div class="land-divider-line"></div>`;
      grid.appendChild(divider);

      byLand[land].forEach(ride => {
        const card = document.createElement('a');
        card.className = 'ride-card';
        card.href = rideUrl(park.slug, ride.slug);
        card.target = '_blank';
        card.rel = 'noopener';
        card.dataset.rideNorm = norm(ride.name);
        card.innerHTML = `
          <div class="rank-badge ${rankCls(ride.rank)}">${ride.rank}</div>
          <div class="ride-card-info">
            <div class="ride-card-name">${ride.name}</div>
            <div class="ride-card-sub">${ride.type}</div>
            <div class="live-status">
              <div class="status-dot loading"></div>
              <span class="wait-pill" style="color:var(--muted)">…</span>
              <span class="sr-pill" style="display:none;font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:8px;white-space:nowrap"></span>
            </div>
          </div>
          <span class="ride-arrow">↗</span>`;
        grid.appendChild(card);
      });
    });

    section.appendChild(grid);
    content.appendChild(section);
  });
}

// ── INIT ──────────────────────────────────────────────────────
build();
fetchAllLive();
</script>
</body>
</html>
