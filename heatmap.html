<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Orlando — Wait Time Heatmaps</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a12;
    --surface: #0d1022;
    --surface2: #111428;
    --border: #1c2040;
    --accent: #6d4aff;
    --accent2: #c4b5fd;
    --text: #eaecf8;
    --muted: #8f96c0;
    --sidebar: 272px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo-mark { width: 26px; height: 26px; flex-shrink: 0; }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    background: linear-gradient(100deg, #c4b5fd 0%, #818cf8 45%, #93c5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── PARK TABS ── */
  .park-tabs {
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 6px;
    flex-shrink: 0;
  }

  .park-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    background: none;
    font-family: 'Outfit', sans-serif;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .park-tab:hover { color: var(--text); border-color: var(--border); background: rgba(255,255,255,0.04); }
  .park-tab[data-park="epic"].active  { background: linear-gradient(135deg,#4f2fff,#7c3aed); color:#fff; box-shadow: 0 2px 12px rgba(109,74,255,0.4); }
  .park-tab[data-park="ioa"].active   { background: linear-gradient(135deg,#0369a1,#0ea5e9); color:#fff; box-shadow: 0 2px 12px rgba(14,165,233,0.35); }
  .park-tab[data-park="usf"].active   { background: linear-gradient(135deg,#b91c1c,#ef4444); color:#fff; box-shadow: 0 2px 12px rgba(239,68,68,0.35); }

  .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tab-dot-epic { background: #818cf8; }
  .tab-dot-ioa  { background: #38bdf8; }
  .tab-dot-usf  { background: #f87171; }

  /* ── LAYOUT ── */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }

  .sidebar-top {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-top p {
    font-size: 9.5px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted); font-weight: 500;
  }

  .ride-list {
    overflow-y: auto; flex: 1; padding: 6px 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }

  .land-label {
    font-size: 9.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.11em; padding: 10px 14px 3px; margin-top: 2px;
  }

  .ride-btn {
    width: 100%; display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: none; border: none;
    border-left: 3px solid transparent; cursor: pointer; text-align: left;
    font-family: 'Outfit', sans-serif;
    transition: background 0.12s, border-color 0.12s;
  }
  .ride-btn:hover  { background: rgba(109,74,255,0.07); }
  .ride-btn.active { background: rgba(109,74,255,0.14); border-left-color: var(--accent); }

  .rank-num {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .r1  { background: linear-gradient(135deg,#f59e0b,#fde68a); color:#1a0a00; }
  .r2  { background: linear-gradient(135deg,#9ca3af,#f3f4f6); color:#111; }
  .r3  { background: linear-gradient(135deg,#b45309,#fcd34d); color:#1a0500; }
  .r45 { background: rgba(109,74,255,0.25); color:#c4b5fd; }
  .r67 { background: rgba(59,130,246,0.25); color:#93c5fd; }
  .rlo { background: var(--border); color: var(--muted); }

  .ride-btn-info { flex: 1; min-width: 0; }
  .ride-btn-name {
    font-size: 12.5px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ride-btn-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* ── MAIN ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .main-header {
    padding: 11px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; gap: 12px;
  }

  .ride-header-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    flex-shrink: 0;
  }

  #ride-title {
    font-family: 'Cinzel', serif;
    font-size: 14px; font-weight: 700;
    color: #f0eeff; letter-spacing: 0.04em;
  }

  #ride-land { font-size: 11px; color: var(--muted); }

  .open-link {
    margin-left: auto; font-size: 11.5px; color: var(--accent2);
    text-decoration: none; opacity: 0.85; transition: opacity 0.15s; white-space: nowrap;
  }
  .open-link:hover { opacity: 1; }

  /* ── IFRAME ── */
  .frame-wrap {
    flex: 1; position: relative; background: #fff;
  }

  #ride-frame {
    width: 100%; height: 100%; border: none; display: block;
  }

  /* Loading overlay */
  .frame-overlay {
    position: absolute; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 5;
  }
  .frame-overlay.hidden { opacity: 0; }

  .spinner {
    width: 34px; height: 34px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay-text { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }

  /* Empty state */
  .empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: var(--bg);
  }
  .empty-icon { font-size: 40px; }
  .empty-title {
    font-family: 'Cinzel', serif; font-size: 14px;
    color: var(--text); letter-spacing: 0.06em;
  }
  .empty-sub { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <svg class="logo-mark" viewBox="0 0 26 26" fill="none">
    <circle cx="13" cy="13" r="12" stroke="#818cf8" stroke-width="1.4"/>
    <circle cx="13" cy="13" r="7" stroke="#c4b5fd" stroke-width="0.9" stroke-dasharray="2.2 1.8"/>
    <path d="M13 5L14 10.8L20 13L14 15.2L13 21L12 15.2L6 13L12 10.8Z" fill="#fcd34d"/>
  </svg>
  <span class="header-title">UNIVERSAL ORLANDO · WAIT TIME HEATMAPS</span>
</header>

<div class="park-tabs">
  <button class="park-tab" data-park="epic" onclick="switchPark('epic')">
    <span class="tab-dot tab-dot-epic"></span> Epic Universe
  </button>
  <button class="park-tab" data-park="ioa" onclick="switchPark('ioa')">
    <span class="tab-dot tab-dot-ioa"></span> Islands of Adventure
  </button>
  <button class="park-tab" data-park="usf" onclick="switchPark('usf')">
    <span class="tab-dot tab-dot-usf"></span> Universal Studios Florida
  </button>
</div>

<div class="body">
  <aside>
    <div class="sidebar-top"><p>Rides ranked by avg. wait</p></div>
    <div class="ride-list" id="ride-list"></div>
  </aside>

  <main>
    <div class="main-header">
      <div class="ride-header-dot"></div>
      <span id="ride-title">Select a ride</span>
      <span id="ride-land"></span>
      <a id="open-link" class="open-link" href="#" target="_blank">↗ Open in Thrill Data</a>
    </div>
    <div class="frame-wrap">
      <div class="frame-overlay hidden" id="overlay">
        <div class="spinner"></div>
        <span class="overlay-text">Loading heatmap…</span>
      </div>
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎢</div>
        <div class="empty-title">Select a Ride</div>
        <div class="empty-sub">Choose any ride from the sidebar to view its 30-day wait heatmap</div>
      </div>
      <iframe id="ride-frame" src="about:blank" title="Ride wait time heatmap"></iframe>
    </div>
  </main>
</div>

<script>
const PARKS = {
  epic: {
    label: 'Epic Universe',
    slug: 'epic-universe',
    lands: {
      "Super Nintendo World": "#e8380d",
      "Ministry of Magic":    "#8b5cf6",
      "Dark Universe":        "#6b7280",
      "Isle of Berk":         "#0d9488",
      "Celestial Park":       "#6d4aff",
    },
    rides: [
      { rank:1,  name:"Mine-Cart Madness",                     land:"Super Nintendo World", type:"Family Coaster",        height:'40"', slug:"minecartmadness" },
      { rank:2,  name:"Mario Kart: Bowser's Challenge",        land:"Super Nintendo World", type:"Interactive Dark Ride", height:'40"', slug:"mariokartbowserschallenge" },
      { rank:3,  name:"Harry Potter & Battle at the Ministry", land:"Ministry of Magic",    type:"Motion Simulation",     height:'40"', slug:"harrypotterandthebattleattheministry" },
      { rank:4,  name:"Monsters Unchained",                    land:"Dark Universe",        type:"KUKA Arm Dark Ride",    height:'48"', slug:"monstersunchainedthefrankensteinexperiment" },
      { rank:5,  name:"Stardust Racers",                       land:"Celestial Park",       type:"Dueling Coaster",       height:'48"', slug:"stardustracers" },
      { rank:6,  name:"Hiccup's Wing Gliders",                 land:"Isle of Berk",         type:"Multi-Launch Coaster",  height:'40"', slug:"hiccupswinggliders" },
      { rank:7,  name:"Curse of the Werewolf",                 land:"Dark Universe",        type:"Spinning Coaster",      height:'40"', slug:"curseofthewerewolf" },
      { rank:8,  name:"Dragon Racer's Rally",                  land:"Isle of Berk",         type:"Sky Fly",               height:'48"', slug:"dragonracersrally" },
      { rank:9,  name:"Fyre Drill",                            land:"Isle of Berk",         type:"Splash Battle",         height:'42"', slug:"fyredrill" },
      { rank:10, name:"Yoshi's Adventure",                     land:"Super Nintendo World", type:"Omnimover Dark Ride",   height:"—",   slug:"yoshisadventure" },
      { rank:11, name:"Constellation Carousel",                land:"Celestial Park",       type:"Family Carousel",       height:"—",   slug:"constellationcarousel" },
    ]
  },

  ioa: {
    label: 'Islands of Adventure',
    slug: 'islands-of-adventure',
    lands: {
      "The Wizarding World":       "#8b5cf6",
      "Jurassic World":            "#16a34a",
      "Marvel Super Hero Island":  "#dc2626",
      "Skull Island":              "#78350f",
      "Toon Lagoon":               "#0ea5e9",
    },
    rides: [
      { rank:1,  name:"Hagrid's Magical Creatures Motorbike Adventure", land:"The Wizarding World",      type:"Story Coaster",      height:'48"', slug:"hagridsmagicalcreaturesmotorbikeadventure" },
      { rank:2,  name:"Jurassic World VelociCoaster",                   land:"Jurassic World",           type:"Launch Coaster",     height:'51"', slug:"jurassicworldvelocicoaster" },
      { rank:3,  name:"Harry Potter and the Forbidden Journey",         land:"The Wizarding World",      type:"KUKA Arm Dark Ride", height:'48"', slug:"harrypotterandtheforbiddenjourney" },
      { rank:4,  name:"The Incredible Hulk Coaster",                   land:"Marvel Super Hero Island", type:"Launch Coaster",     height:'54"', slug:"theincrediblehulkcoaster" },
      { rank:5,  name:"Flight of the Hippogriff",                      land:"The Wizarding World",      type:"Family Coaster",     height:'36"', slug:"flightofthehippogriff" },
      { rank:6,  name:"The Amazing Adventures of Spider-Man",          land:"Marvel Super Hero Island", type:"3D Dark Ride",       height:'40"', slug:"theamazingadventuresofspiderman" },
      { rank:7,  name:"Skull Island: Reign of Kong",                   land:"Skull Island",             type:"Dark Ride",          height:'36"', slug:"skullislandreignofkong" },
      { rank:8,  name:"Doctor Doom's Fearfall",                        land:"Marvel Super Hero Island", type:"Drop Tower",         height:'52"', slug:"doctordoomsfearfall" },
      { rank:9,  name:"Popeye & Bluto's Bilge-Rat Barges",            land:"Toon Lagoon",              type:"River Raft Ride",    height:'42"', slug:"popeyeandblutosbilgeratbarges" },
      { rank:10, name:"Pteranodon Flyers",                             land:"Jurassic World",           type:"Suspended Ride",     height:"—",   slug:"pteranodonflyers" },
    ]
  },

  usf: {
    label: 'Universal Studios Florida',
    slug: 'universal-studios',
    lands: {
      "The Wizarding World": "#8b5cf6",
      "New York":            "#64748b",
      "Minion Land":         "#f59e0b",
      "World Expo":          "#0ea5e9",
      "Springfield":         "#e8380d",
      "San Francisco":       "#dc2626",
      "Hollywood":           "#db2777",
    },
    rides: [
      { rank:1, name:"Harry Potter and the Escape from Gringotts",  land:"The Wizarding World", type:"Multi-Dimension Ride",  height:'42"', slug:"harrypotterandtheescapefromgringotts" },
      { rank:2, name:"Revenge of the Mummy",                        land:"New York",            type:"Indoor Coaster",        height:'48"', slug:"revengeofthemummy" },
      { rank:3, name:"Transformers: The Ride-3D",                   land:"New York",            type:"3D Dark Ride",          height:'40"', slug:"transformerstherided" },
      { rank:4, name:"Despicable Me Minion Mayhem",                 land:"Minion Land",         type:"Motion Simulator",      height:'40"', slug:"despicablememinionmayhem" },
      { rank:5, name:"Men in Black: Alien Attack",                  land:"World Expo",          type:"Interactive Dark Ride", height:'42"', slug:"meninblackalienattack" },
      { rank:6, name:"The Simpsons Ride",                           land:"Springfield",         type:"Motion Simulator",      height:'40"', slug:"thesimpsonsride" },
      { rank:7, name:"Fast & Furious: Supercharged",               land:"San Francisco",       type:"Motion Simulator",      height:'40"', slug:"fastfurioussupercharged" },
      { rank:8, name:"Race Through New York Starring Jimmy Fallon", land:"New York",            type:"Flying Theater",        height:'40"', slug:"racethroughnewyorkstarringjimmyfallon" },
      { rank:9, name:"E.T. Adventure",                              land:"Hollywood",           type:"Dark Ride",             height:'34"', slug:"etadventure" },
    ]
  }
};

function rankCls(r){ return r===1?'r1':r===2?'r2':r===3?'r3':r<=5?'r45':r<=7?'r67':'rlo'; }

let currentPark = null;

function buildSidebar(parkKey) {
  const park = PARKS[parkKey];
  const list = document.getElementById('ride-list');
  list.innerHTML = '';

  const landOrder = [...new Set(park.rides.map(r => r.land))];
  const byLand = {};
  park.rides.forEach(r => (byLand[r.land] = byLand[r.land] || []).push(r));

  landOrder.forEach(land => {
    const lbl = document.createElement('div');
    lbl.className = 'land-label';
    lbl.style.color = park.lands[land] || '#aaa';
    lbl.textContent = land;
    list.appendChild(lbl);

    byLand[land].forEach(ride => {
      const btn = document.createElement('button');
      btn.className = 'ride-btn';
      btn.id = 'btn-' + ride.slug;
      btn.innerHTML = `
        <div class="rank-num ${rankCls(ride.rank)}">${ride.rank}</div>
        <div class="ride-btn-info">
          <div class="ride-btn-name">${ride.name}</div>
          <div class="ride-btn-sub">${ride.type} · ${ride.height}</div>
        </div>`;
      btn.addEventListener('click', () => selectRide(ride, parkKey));
      list.appendChild(btn);
    });
  });
}

function selectRide(ride, parkKey) {
  const park = PARKS[parkKey];
  document.querySelectorAll('.ride-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + ride.slug)?.classList.add('active');

  document.getElementById('ride-title').textContent = ride.name;
  document.getElementById('ride-land').textContent = ride.land + ' · ' + ride.type;

  const url = `https://www.thrill-data.com/waits/attraction/${park.slug}/${ride.slug}/#heatmapwait`;
  document.getElementById('open-link').href = url;

  // Hide empty state, show loader
  document.getElementById('empty-state').style.display = 'none';
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');

  const frame = document.getElementById('ride-frame');
  frame.src = '';

  // Small delay so browser clears prior page before setting new src
  setTimeout(() => {
    frame.src = url;
  }, 50);

  frame.onload = () => overlay.classList.add('hidden');
}

function switchPark(parkKey) {
  if (currentPark === parkKey) return;
  currentPark = parkKey;

  document.querySelectorAll('.park-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.park === parkKey)
  );

  buildSidebar(parkKey);

  // Reset main area
  document.getElementById('ride-title').textContent = 'Select a ride';
  document.getElementById('ride-land').textContent = '';
  document.getElementById('open-link').href = '#';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('ride-frame').src = 'about:blank';
  document.getElementById('empty-state').style.display = '';
}

// Init
switchPark('epic');
</script>
</body>
</html>
